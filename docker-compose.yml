services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./models:/app/models
    env_file:
      - .env
    environment:
      - DEBUG=false

    # Quick fix: Auto-restart when container crashes
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:8000 --workers 8 --preload --max-requests 20 --timeout 300 political_classifier.wsgi:application
