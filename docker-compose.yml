services:
  web:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./models:/app/models
    #TODO
    environment:
      - DEBUG=False
      - SECRET_KEY=docker-secret-key-change-in-production

    # Quick fix: Auto-restart when container crashes
    restart: no
    command: gunicorn --bind 0.0.0.0:8001 --workers 1 --max-requests 20 --timeout 300 political_classifier.wsgi:application
