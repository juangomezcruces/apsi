<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Automated Political Stance Identification (APSI){% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4rem 0;
        }
        .card {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            border: none;
            border-radius: 1rem;
        }
        .result-card {
            margin-bottom: 1.5rem;
        }
        .score-badge {
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
        }
        .dimension-card {
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
            border-left: 4px solid #007bff;
        }
        .navbar-brand {
            font-weight: bold;
        }
        footer {
            background-color: #343a40;
            color: white;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        .dimension-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 1rem 0;
        }
        .bg-custom {
   	        background-color: #1F2A6D !important;
	    }
	    .form-check-input:checked {
    	    background-color: #37A3B1;
    	    border-color: #37A3B1;
	    }
	
        .form-check-input:focus {
    	    border-color: #37A3B1;
    	    box-shadow: 0 0 0 0.25rem rgba(14, 37, 107, 0.25);
	    }
        .italic-text {
    	    font-style: italic;
	    }
	 
        .truncate-text {
	        display: -webkit-box;
            -webkit-line-clamp: 4;
   	        -webkit-box-orient: vertical;
            overflow: hidden;
	    }
        .truncate-text.expanded {
            -webkit-line-clamp: unset;
	    }

        	.read-more {
          	    display: inline-block;
  	            margin-top: 5px;
   	            font-size: 0.70rem;
    	        color: #0E256B;
    	        cursor: pointer;
    	        text-decoration: none;
	    }
        	.read-more:hover {
   	            text-decoration: underline;
	    }
            .btn-outline-custom-primary {
                color: #37A3B1;
                border-color: #37A3B1;
        }   
            .btn-outline-custom-primary:hover {
                background-color: #37A3B1;
                color: #fff;
        }
            .btn-outline-custom-secondary {
                color: #cc0000;
                border-color: #cc0000;
        }
            .btn-outline-custom-secondary:hover {
                background-color: #cc0000;
            color: #fff;
        }
.disclaimer-box {
  max-width: 800px;
  margin: 0 auto;
  padding: 1.5rem;

  background:
   
    repeating-linear-gradient(
      to right,
      #dc3545 0 14px,
      transparent 14px 28px
    ) top / 100% 3px no-repeat,

   
    repeating-linear-gradient(
      to right,
      #dc3545 0 14px,
      transparent 14px 28px
    ) bottom / 100% 3px no-repeat,

 
    repeating-linear-gradient(
      to bottom,
      #dc3545 0 14px,
      transparent 14px 28px
    ) left / 3px 100% no-repeat,

    repeating-linear-gradient(
      to bottom,
      #dc3545 0 14px,
      transparent 14px 28px
    ) right / 3px 100% no-repeat,

    #ffffff;

  border-radius: 16px;


  font-size: 0.85rem;
  color: #555; 

  box-sizing: border-box;
}

.scale-wrap {
  position: relative;
  padding-top: 3rem; 
}

.scale-line {
  position: relative;
  height: 10px;
}

.scale-line::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 3px;
  transform: translateY(-50%);
  background: #adb5bd; /* gray line */
  border-radius: 999px;
}

.scale-dot {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  background: #e83e8c; 
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(232, 62, 140, 0.15);
}

.scale-score {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  white-space: nowrap;
  line-height: 1;
}

.scale-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 0.35rem;
  font-size: 0.8rem;
  color: #6c757d;
}
.economic-badge {
  background-color: #e83e8c;
  color: #fff;
  padding: 0.45em 0.7em;
  border-radius: 0.65rem;
}
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #000;">
	<div class="container">
        	<img 
    	src="{% static 'APSIblack.png' %}"
    	alt="APSI Logo" 
    	class="img-fluid"
    	style="max-height: 35px;">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'classifier:index' %}">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center">
        <div class="container">
            <p>&copy; Automated Political Stance Identification.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
